<?xml version="1.0" encoding="UTF-8"?>
<!--
  LATTICE Theme #1 — Fine Dining
  Brand monogram for "Maison Lumière" (initials "ML").

  Skill 2 — W3C Design Tokens
    Every visible color is a `var(--token-*)` reference. The consuming
    app's ThemeProvider must inject the :root rules from `tokens.json`
    for this asset to render with the theme's palette. As a fallback
    we set the literal `currentColor` so the SVG inherits text color
    from its CSS context (the brand mark in Header.tsx and Footer.tsx
    uses this pattern).

  Usage
    <BrandMark className="h-8 w-8" />     — sized by the parent
    <BrandMark variant="dark" />          — dark surface variant
-->
<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 64 64"
  fill="none"
  stroke="currentColor"
  stroke-width="1.25"
  stroke-linecap="round"
  stroke-linejoin="round"
  role="img"
  aria-label="Maison Lumière monogram"
>
  <!-- Hairline border -->
  <rect
    x="2"
    y="2"
    width="60"
    height="60"
    rx="2"
    fill="none"
  />
  <!-- The "M" — two tapered peaks -->
  <path d="M 14 50 L 14 14 L 22 14 L 32 36 L 42 14 L 50 14 L 50 50" />
  <!-- The "L" — formed by the right column + a baseline accent -->
  <path d="M 28 50 L 52 50" />
  <!-- Hairline serif accents (echo Cormorant Garamond proportions) -->
  <line x1="11" y1="14" x2="17" y2="14" />
  <line x1="47" y1="14" x2="53" y2="14" />
  <line x1="11" y1="50" x2="17" y2="50" />
  <line x1="47" y1="50" x2="53" y2="50" />
</svg>
