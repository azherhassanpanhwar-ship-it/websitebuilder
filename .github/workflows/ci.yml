name: CI

# LATTICE CI — Task 0.2 (CLAUDE.md §7.1)
# Runs on every push and pull request to main. The pipeline is the
# quality gate before any task can be merged:
#
#   1. Install     — pnpm install with the lockfile
#   2. Lint        — ESLint (next/core-web-vitals + next/typescript)
#   3. Typecheck   — tsc --noEmit (strict mode)
#   4. Build       — next build (Turbopack)
#
# pnpm 9 is pinned via corepack so the CI runner uses the same package
# manager as every contributor's local machine (see README.md).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch — saves CI minutes on rapid pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable corepack (pnpm)
        run: corepack enable

      - name: Setup pnpm
        run: pnpm --version

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test
        env:
          CI: "true"

      - name: Build
        run: pnpm build
        env:
          # CI builds don't need real secrets; placeholder values are
          # fine because Next.js only embeds NEXT_PUBLIC_* at build time.
          NEXT_PUBLIC_WS_URL: "ws://localhost:1234"
          PEXELS_API_KEY: "ci-placeholder"
          SUPABASE_URL: "https://ci-placeholder.supabase.co"
          SUPABASE_ANON_KEY: "ci-placeholder"
          STRIPE_SECRET_KEY: "sk_test_ci_placeholder"
          DATABASE_URL: "postgresql://postgres:postgres@localhost:54322/postgres"
